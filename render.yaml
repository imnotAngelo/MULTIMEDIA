services:
  - type: web
    name: multimedia-learning-backend
    runtime: node
    region: ohio
    plan: standard
    buildCommand: cd backend && npm ci && npm run build
    startCommand: node backend/start-server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        generateValue: true
      - key: FRONTEND_URL
        value: https://multimedia-learning.vercel.app
      - key: SUPABASE_URL
        scope: backend
      - key: SUPABASE_ANON_KEY
        scope: backend
      - key: SUPABASE_SERVICE_KEY
        scope: backend
      - key: JWT_SECRET
        scope: backend
      - key: JWT_REFRESH_SECRET
        scope: backend
      - key: JWT_EXPIRATION
        value: "3600"
      - key: JWT_REFRESH_EXPIRATION
        value: "86400"
